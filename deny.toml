# cargo-deny configuration — supply-chain policy enforced in CI.
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# Fail on any crate with a known security advisory (RustSec DB) or a yanked release.
yanked = "deny"
# Consciously-accepted advisories (each needs a reason). A *real* vulnerability
# would have a different ID and still fail the build.
ignore = [
    # `paste` is unmaintained (not vulnerable) — RUSTSEC-2024-0436. It's a
    # transitive proc-macro dep via ratatui + netstat2, with no upgrade path.
    # Revisit if those crates drop it or a real vulnerability is filed.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Only these (permissive, audited) licenses are allowed in the dependency tree.
# A dependency with anything else fails CI until it's reviewed and added here.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Surface duplicate versions of the same crate (bloat / drift), don't fail on them.
multiple-versions = "warn"
# Wildcard ("*") version requirements are forbidden — they're a supply-chain risk.
wildcards = "deny"

[sources]
# Crates may only come from crates.io. Block unknown registries and git sources,
# which is the core defense against dependency source-substitution attacks.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
