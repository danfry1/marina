version: 2
updates:
  # Rust dependencies — security + version updates, grouped into one PR.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo:
        patterns: ["*"]

  # The GitHub Actions themselves — keeps the SHA pins current (and patched).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
