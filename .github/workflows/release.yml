name: release

# Tag a version to cut a release:  git tag v0.1.0 && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload binaries

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        run: tar -C "target/${{ matrix.target }}/release" -czf "marina-${{ matrix.target }}.tar.gz" marina
      - name: Attach to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: marina-${{ matrix.target }}.tar.gz

  # Token-less crates.io publish via Trusted Publishing (OIDC). Requires a
  # trusted publisher configured on crates.io for danfry1/marina + release.yml.
  publish-crate:
    name: crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the short-lived OIDC token; no stored secret
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1
        id: auth
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
