name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: jobs only read the repo. (Hardening — no write token exposed.)
permissions:
  contents: read

# Don't pile up runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a full commit SHA (not a movable tag),
      # so a compromised/retagged release can't inject code. Dependabot bumps these.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Ensure lsof (used by log-discovery tests)
        run: command -v lsof >/dev/null || { sudo apt-get update && sudo apt-get install -y lsof; }
      # --locked: build against the committed Cargo.lock exactly; fail rather than
      # silently resolve different dependency versions.
      - run: cargo test --locked --all-targets

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --locked -- -D warnings

  security:
    name: supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      # Advisories (RustSec), license allow-list, banned/wildcard crates, and
      # source restriction (crates.io only) — all driven by deny.toml.
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check
